<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 歷史成長數據圖表 (2005 - 2026)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f3f4f6;
        }

        .chart-container {
            position: relative;
            height: 60vh;
            width: 100%;
        }

        /* 自訂滾動條讓里程碑區塊更好看 */
        .milestone-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .milestone-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <div
        class="w-full max-w-6xl bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-gray-100 flex flex-col md:flex-row gap-8">

        <!-- 左側：圖表區塊 -->
        <div class="flex-1 w-full md:w-2/3">
            <div class="mb-6 text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start gap-3 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                        class="w-10 h-10 text-red-600">
                        <path
                            d="M21.582 6.186a2.64 2.64 0 0 0-1.859-1.874C18.082 3.88 12 3.88 12 3.88s-6.082 0-7.723.432a2.64 2.64 0 0 0-1.859 1.874C2 7.842 2 12 2 12s0 4.158.418 5.814a2.64 2.64 0 0 0 1.859 1.874C5.918 20.12 12 20.12 12 20.12s6.082 0 7.723-.432a2.64 2.64 0 0 0 1.859-1.874C22 16.158 22 12 22 12s0-4.158-.418-5.814zM9.996 15.005l.005-6.01 5.56 3.003-5.565 3.007z" />
                    </svg>
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-800">YouTube 連續成長趨勢 (2005-2026)</h1>
                </div>
                <p class="text-gray-500 text-sm md:text-base">展示完整連續年份的活躍用戶成長與廣告營收變化。<br />
                    <span class="inline-block mt-2 px-2 py-1 bg-yellow-100 text-yellow-800 text-xs font-bold rounded">💡
                        黃色標記點表示該年度發生重大里程碑</span>
                </p>
            </div>

            <div class="chart-container">
                <canvas id="youtubeChart"></canvas>
            </div>
        </div>

        <!-- 右側：完整里程碑時間軸 -->
        <div class="w-full md:w-1/3 bg-gray-50 rounded-xl p-5 border border-gray-200 flex flex-col h-[75vh]">
            <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span>📌</span> 發展歷史與演算法演進
            </h3>
            <div class="milestone-scroll overflow-y-auto pr-2 space-y-4 flex-1">
                <!-- 內容由 JS 動態生成 -->
                <div id="milestone-container"></div>
            </div>
        </div>

    </div>

    <script>
        // 準備連續歷史數據 (2005 - 2026)
        const years = [
            '2005', '2006', '2007', '2008', '2009', '2010', '2011', '2012',
            '2013', '2014', '2015', '2016', '2017', '2018', '2019', '2020',
            '2021', '2022', '2023', '2024', '2025', '2026'
        ];

        // 月活躍用戶 (億人) - 補齊中間年份的平滑過渡
        const mauData = [
            0.01, 0.02, 0.5, 1.0, 1.5, 2.0, 4.5, 7.3,
            10.1, 11.5, 13.4, 14.8, 16.3, 18.0, 20.7, 22.8,
            25.1, 25.6, 27.0, 27.5, 27.9, 28.3
        ];

        // 廣告營收 (億美元) - 補齊中間年份
        const revenueData = [
            0, 0, 0.2, 0.3, 0.5, 8.0, 12.0, 17.0,
            31.0, 42.0, 55.0, 67.0, 81.0, 111.0, 151.0, 197.0,
            288.0, 292.0, 315.0, 350.0, 450.0, 600.0
        ];

        // 里程碑事件 (僅標記有重大事件的年份)
        const milestones = [
            "12月正式脫離 Beta 版上線",           // 2005
            "Google 以 16.5 億美元天價收購",      // 2006
            "",                                // 2007
            "",                                // 2008
            "",                                // 2009
            "導入 TrueView 可略過廣告，奠定變現基礎", // 2010
            "",                                // 2011
            "介面大幅翻新，確立 VOD 長影音霸主地位", // 2012
            "全球月活躍用戶正式突破 10 億大關",      // 2013
            "",                                // 2014
            "推出 YouTube Premium 無廣告訂閱制",   // 2015
            "",                                // 2016
            "演算法核心從「點擊率」全面轉向「觀看時長」", // 2017
            "",                                // 2018
            "月活躍用戶突破 20 億大關",            // 2019
            "疫情紅利帶動流量與觀看時長大幅飆升",     // 2020
            "迎戰 TikTok，全球正式推出 YouTube Shorts", // 2021
            "",                                // 2022
            "Shorts 日觀看破 500 億，強化長短影音互導", // 2023
            "",                                // 2024
            "",                                // 2025
            "預估：演算法進入 Shorts ➡️ VOD ➡️ Live 成熟生態系" // 2026
        ];

        // 動態生成右側時間軸
        const container = document.getElementById('milestone-container');
        years.forEach((year, index) => {
            if (milestones[index] !== "") {
                container.innerHTML += `
                    <div class="relative pl-6 border-l-2 border-blue-200 pb-2">
                        <div class="absolute w-3 h-3 bg-yellow-400 rounded-full -left-[7px] top-1.5 border-2 border-white shadow-sm"></div>
                        <div class="text-sm font-bold text-blue-600">${year}</div>
                        <div class="text-sm text-gray-700 mt-1">${milestones[index]}</div>
                    </div>
                `;
            }
        });

        // 初始化 Chart.js
        const ctx = document.getElementById('youtubeChart').getContext('2d');
        const youtubeChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: years,
                datasets: [
                    {
                        label: '廣告營收 (億美元)',
                        data: revenueData,
                        type: 'bar',
                        backgroundColor: 'rgba(239, 68, 68, 0.6)', // Tailwind red-500
                        hoverBackgroundColor: 'rgba(239, 68, 68, 0.9)',
                        borderRadius: 2,
                        yAxisID: 'y1',
                        order: 2
                    },
                    {
                        label: '月活躍用戶 (億人)',
                        data: mauData,
                        type: 'line',
                        borderColor: 'rgba(37, 99, 235, 1)', // Tailwind blue-600
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        borderWidth: 3,
                        // 根據是否有里程碑來決定點的大小與顏色
                        pointRadius: function (context) {
                            return milestones[context.dataIndex] !== "" ? 7 : 3;
                        },
                        pointBackgroundColor: function (context) {
                            return milestones[context.dataIndex] !== "" ? '#fbbf24' : 'rgba(37, 99, 235, 1)'; // 黃色 or 藍色
                        },
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointHoverRadius: function (context) {
                            return milestones[context.dataIndex] !== "" ? 10 : 6;
                        },
                        fill: true,
                        tension: 0.4, // 平滑曲線
                        yAxisID: 'y',
                        order: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            font: {
                                family: "'PingFang TC', 'Microsoft JhengHei', sans-serif",
                                size: 13
                            },
                            usePointStyle: true,
                            padding: 15
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(17, 24, 39, 0.9)',
                        titleFont: {
                            family: "'PingFang TC', 'Microsoft JhengHei', sans-serif",
                            size: 15,
                            weight: 'bold'
                        },
                        bodyFont: {
                            family: "'PingFang TC', 'Microsoft JhengHei', sans-serif",
                            size: 13
                        },
                        padding: 12,
                        cornerRadius: 8,
                        callbacks: {
                            title: function (context) {
                                return context[0].label + ' 年';
                            },
                            label: function (context) {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                if (context.parsed.y !== null) {
                                    label += context.parsed.y;
                                    if (context.datasetIndex === 0) label += ' 億美元';
                                    if (context.datasetIndex === 1) label += ' 億人';
                                }
                                return label;
                            },
                            afterBody: function (context) {
                                const index = context[0].dataIndex;
                                if (milestones[index] !== "") {
                                    return '\n🌟 重大事件：\n' + milestones[index];
                                }
                                return '';
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            font: {
                                family: "'PingFang TC', 'Microsoft JhengHei', sans-serif"
                            },
                            maxRotation: 45,
                            minRotation: 45
                        }
                    },
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        title: {
                            display: true,
                            text: '月活躍用戶 (億人)',
                            color: 'rgba(37, 99, 235, 1)',
                            font: {
                                family: "'PingFang TC', 'Microsoft JhengHei', sans-serif",
                                weight: 'bold'
                            }
                        },
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        },
                        suggestedMax: 35
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        title: {
                            display: true,
                            text: '年度廣告營收 (億美元)',
                            color: 'rgba(239, 68, 68, 1)',
                            font: {
                                family: "'PingFang TC', 'Microsoft JhengHei', sans-serif",
                                weight: 'bold'
                            }
                        },
                        grid: {
                            drawOnChartArea: false
                        },
                        suggestedMax: 700
                    }
                }
            }
        });
    </script>
</body>

</html>
