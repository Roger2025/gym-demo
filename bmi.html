    <title>BMI計算機</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        form {
            width: 60%;
            height: 250px;

        @media screen and (max-width:768px) {

<body>
    <form action="">
        <h1>BMI計算機</h1>
        <label for="name">姓名:</label>
        <input type="text" id="name" name="name" placeholder="請輸入姓名">
        <br>
        <label for="height">身高:</label>
        <input type="number" id="height" name="height" step="0.1" required>
        <br>
        <label for="weight">體重:</label>
        <!-- required 必需 -->
        <input type="number" id="weight" name="weight" step="0.1" required>
        <p>
            <input type="submit" value="計算BMI">
        </p>
    </form>
    <br>
    <a href="index.html">回首頁</a>
    <script>
        let height = Number(prompt("請輸入身高(cm)"));
        let weight = Number(prompt("請輸入體重(kg)"));

        let bmi = getBMI(height, weight);
        document.write(`<h1>身高:${height}cm<br>體重:${weight}kg<br>BMI:${bmi.toFixed(2)}</h1>`);
        document.write(`<h1 style="color:blue">評語: ${getComment(bmi)}</h1>`);
